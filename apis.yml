apis:
  - aid: opendata-schleswig-holstein-de:catalog
    name: Open Data Schleswig-Holstein CKAN Action API
    description: >-
      CKAN Action API for Open Data Schleswig-Holstein, a consistent JSON-over-HTTP interface over a catalog of 32,414 datasets. Standard actions include package_search, package_show, package_list, organization_list, group_list, tag_list, and resource_search; datastore_search is available where the DataStore extension is enabled. Base URL https://opendata.schleswig-holstein.de/api/3/action/.
    humanURL: https://opendata.schleswig-holstein.de
