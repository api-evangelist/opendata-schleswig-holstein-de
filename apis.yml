aid: opendata-schleswig-holstein-de
name: Open Data Schleswig-Holstein
description: >-
  Open Data Schleswig-Holstein is a state government open-data portal for Germany running CKAN.
  It exposes the CKAN catalog API, a standardized machine-readable interface over approximately 32,414 datasets,
  supporting programmatic dataset search, metadata retrieval, and resource access. Because it runs CKAN, it shares a
  consistent API surface with every other CKAN portal, making it uniformly harvestable and integrable.
